<style>
  :root {
    --bg: #0B0F19;
    --card: #111827;
    --border: #1F2937;
    --text: #E5E7EB;
    --text2: #9CA3AF;
    --text3: #6B7280;
    --text4: #4B5563;
    --green: #10B981;
    --yellow: #F59E0B;
    --red: #EF4444;
    --blue: #60A5FA;
    --purple: #A78BFA;
    --pink: #F472B6;
    --gold: #FBBF24;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',-apple-system,sans-serif;
    min-height:100vh; min-height:100dvh;
    overflow-x:hidden;
    padding-bottom:env(safe-area-inset-bottom,20px);
    overscroll-behavior:none;
  }
  .mono { font-family:'JetBrains Mono',monospace; }

  /* Splash Screen */
  .splash {
    position:fixed; inset:0; z-index:9999;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition:opacity 0.4s ease;
  }
  .splash.hide { opacity:0; pointer-events:none; }
  .splash-logo { font-size:42px; font-weight:700; letter-spacing:-1px; margin-bottom:4px; }
  .splash-logo span { color:var(--yellow); }
  .splash-logo .ver { color:var(--green); font-size:32px; }
  .splash-sub { font-size:11px; color:var(--text3); letter-spacing:3px; margin-top:8px; }
  .splash-bar { width:120px; height:3px; background:var(--border); border-radius:4px; margin-top:24px; overflow:hidden; }
  .splash-bar-fill { height:100%; width:0; background:var(--yellow); border-radius:4px; animation:splashLoad 1s ease forwards; }
  @keyframes splashLoad { to { width:100%; } }
  .splash-credit { position:absolute; bottom:40px; font-size:11px; color:var(--text4); }
  .splash-credit a { color:var(--yellow); text-decoration:none; }

  .header {
    position:sticky; top:0; z-index:100;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:16px 20px 12px;
    padding-top:calc(env(safe-area-inset-top,16px) + 8px);
  }
  .header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .header-label { font-size:11px; color:var(--text3); letter-spacing:2px; margin-bottom:2px; }
  .header-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .header-title span { color:var(--yellow); }
  .header-pct { font-size:22px; font-weight:700; color:var(--green); text-align:right; }
  .header-count { font-size:11px; color:var(--text3); text-align:right; }
  .tabs { display:flex; gap:6px; }
  .tab {
    padding:8px 18px; border-radius:10px; border:none;
    background:transparent; color:var(--text3);
    font-size:13px; font-weight:600; cursor:pointer;
    font-family:'JetBrains Mono',monospace;
    transition:all 0.15s;
  }
  .tab.active { background:var(--border); color:#F9FAFB; }
  .content { padding:16px; }
  .status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
  .status-card { border-radius:14px; padding:12px 10px; text-align:center; border:1px solid transparent; }
  .status-card-num { font-size:22px; font-weight:700; }
  .status-card-label { font-size:10px; font-weight:600; letter-spacing:0.5px; opacity:0.85; }
  .progress-rings { display:flex; gap:12px; justify-content:center; margin-bottom:28px; }
  .ring-wrap { position:relative; width:100px; height:100px; }
  .ring-wrap svg { transform:rotate(-90deg); }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-pct { font-size:18px; font-weight:700; }
  .ring-label { font-size:9px; color:var(--text2); font-weight:600; }
  .part-header { font-size:11px; font-weight:700; letter-spacing:2px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .part-header .role { color:var(--text3); font-weight:500; }
  .mod-row {
    display:flex; align-items:center; width:100%;
    padding:14px; margin-bottom:6px; border-radius:12px;
    border:1px solid var(--border); background:var(--card);
    cursor:pointer; gap:12px; text-align:left;
    -webkit-appearance:none; appearance:none; color:inherit;
    font-family:inherit; font-size:inherit;
    transition:background 0.15s;
  }
  .mod-row:active { background:#1a2332; }
  .mod-id { font-size:11px; font-weight:700; color:var(--text3); min-width:36px; }
  .mod-info { flex:1; min-width:0; }
  .mod-title { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mod-bar-wrap { display:flex; align-items:center; gap:8px; margin-top:4px; }
  .mod-bar { height:3px; flex:1; background:var(--border); border-radius:4px; overflow:hidden; }
  .mod-bar-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }
  .mod-frac { font-size:10px; color:var(--text3); min-width:50px; text-align:right; }
  .mod-diff { font-size:9px; font-weight:700; padding:3px 8px; border-radius:6px; }
  .mod-arrow { color:var(--text4); font-size:18px; }
  .filters { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .filter-btn {
    padding:6px 14px; border-radius:20px;
    border:1px solid var(--border); background:var(--card);
    color:var(--text2); font-size:12px; font-weight:600;
    cursor:pointer; font-family:'JetBrains Mono',monospace;
    transition:all 0.15s;
  }
  .filter-btn.active { border-color:var(--yellow); background:#422006; color:var(--gold); }
  .filter-count { margin-left:5px; opacity:0.7; }
  .mod-link {
    font-size:12px; font-weight:700; background:none; border:none;
    cursor:pointer; margin-bottom:8px; padding:0;
    font-family:'JetBrains Mono',monospace;
  }
  .lesson-row-mini {
    display:flex; align-items:center; gap:10px;
    padding:12px; margin-bottom:4px; border-radius:10px;
    background:var(--card); border:1px solid var(--border);
  }
  .lesson-id { font-size:11px; color:var(--text3); min-width:32px; }
  .lesson-title-wrap { flex:1; font-size:13px; color:#D1D5DB; line-height:1.3; min-width:0; }
  .lesson-title-text { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lesson-note-preview { display:block; font-size:11px; color:var(--text3); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .back-btn { font-size:12px; color:var(--text3); background:none; border:none; cursor:pointer; padding:0; margin-bottom:12px; font-family:'JetBrains Mono',monospace; }
  .mod-detail-header { background:var(--card); border-radius:16px; padding:20px; margin-bottom:16px; }
  .mod-detail-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .mod-detail-tag { font-size:11px; letter-spacing:2px; margin-bottom:4px; }
  .mod-detail-title { font-size:18px; font-weight:700; color:#F9FAFB; }
  .mod-detail-count { font-size:12px; color:var(--text3); margin-top:6px; }
  .bulk-row { display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; align-items:center; }
  .bulk-label { font-size:11px; color:var(--text3); line-height:28px; }
  .bulk-btn {
    padding:4px 12px; border-radius:16px;
    background:transparent; font-size:11px; font-weight:600;
    cursor:pointer; font-family:'JetBrains Mono',monospace;
    transition:all 0.15s;
  }
  .lesson-card {
    background:var(--card); border-radius:14px; padding:16px 14px;
    margin-bottom:8px; border:1px solid var(--border);
    border-left-width:3px;
  }
  .lesson-inner { display:flex; align-items:flex-start; gap:10px; }
  .lesson-num { font-size:13px; font-weight:700; color:var(--text4); min-width:32px; padding-top:2px; }
  .lesson-content { flex:1; }
  .lesson-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:8px; }
  .lesson-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .note-bubble { margin-top:8px; padding:8px 12px; border-radius:8px; background:#0D1117; font-size:12px; color:var(--text2); line-height:1.5; font-style:italic; white-space:pre-wrap; }
  .status-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:20px;
    font-size:13px; font-weight:600; cursor:pointer;
    font-family:'JetBrains Mono',monospace;
    white-space:nowrap; border:1px solid transparent;
    transition:all 0.15s;
  }
  .status-pill.compact { padding:4px 10px; font-size:12px; gap:4px; }
  .status-pill .icon { font-size:12px; }
  .status-pill.compact .icon { font-size:10px; }
  .note-btn {
    padding:5px 12px; border-radius:16px;
    border:1px solid #374151; background:transparent;
    color:var(--text3); font-size:12px; font-weight:500;
    cursor:pointer; font-family:'JetBrains Mono',monospace;
  }
  .note-btn.has-note { background:#1E3A5F; color:var(--blue); }
  .overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    z-index:1000; padding:20px;
  }
  .modal {
    background:var(--card); border-radius:20px; padding:24px;
    border:1px solid #374151; min-width:280px; max-width:400px; width:100%;
    box-shadow:0 25px 50px rgba(0,0,0,0.5);
  }
  .modal-label { font-size:12px; font-weight:600; color:var(--text2); letter-spacing:1px; margin-bottom:16px; }
  .modal-opt {
    display:flex; align-items:center; gap:12px;
    padding:14px 18px; border-radius:12px;
    border:2px solid transparent; background:var(--border);
    color:#D1D5DB; font-size:15px; font-weight:600;
    cursor:pointer; font-family:'JetBrains Mono',monospace;
    margin-bottom:8px; width:100%;
    transition:all 0.15s;
  }
  .modal-opt.active { border-color:currentColor; }
  .modal-opt .opt-icon { font-size:16px; width:24px; text-align:center; }
  .note-modal { max-width:440px; }
  .note-modal-title { font-size:14px; color:var(--text); margin-bottom:16px; }
  .note-textarea {
    width:100%; min-height:140px; padding:14px;
    border-radius:12px; border:1px solid #374151;
    background:#0D1117; color:var(--text); font-size:14px;
    font-family:'DM Sans',sans-serif; resize:vertical; outline:none;
  }
  .note-textarea:focus { border-color:var(--blue); }
  .note-btns { display:flex; gap:10px; margin-top:14px; justify-content:flex-end; }
  .btn-cancel { padding:10px 20px; border-radius:10px; border:1px solid #374151; background:transparent; color:var(--text2); font-size:14px; font-weight:600; cursor:pointer; }
  .btn-save { padding:10px 24px; border-radius:10px; border:none; background:var(--green); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    padding:10px 24px; border-radius:12px;
    background:#1F2937; color:var(--green); border:1px solid var(--green);
    font-size:13px; font-weight:600; font-family:'JetBrains Mono',monospace;
    z-index:2000; opacity:0; transition:opacity 0.3s;
    pointer-events:none;
  }
  .toast.show { opacity:1; }
  .data-bar {
    display:flex; gap:8px; justify-content:center; padding:16px;
    border-top:1px solid var(--border); margin-top:20px; flex-wrap:wrap;
  }
  .data-btn {
    padding:8px 18px; border-radius:10px;
    border:1px solid var(--border); background:var(--card);
    color:var(--text2); font-size:12px; font-weight:600;
    cursor:pointer; font-family:'JetBrains Mono',monospace;
  }
  .data-btn:active { background:var(--border); }

  .footer {
    text-align:center; padding:20px 16px 8px; font-size:11px; color:var(--text4);
    border-top:1px solid var(--border); margin-top:8px;
  }
  .footer a { color:var(--yellow); text-decoration:none; }

  @media(min-width:768px){
    .status-grid { grid-template-columns:repeat(5,1fr); }
    .content { padding:20px 24px; }
  }
</style>
</head>

  try{state.notes=JSON.parse(localStorage.getItem("ddr2-notes")||"{}")}catch(e){state.notes={}}
}
function saveStatuses(){localStorage.setItem("ddr2-statuses",JSON.stringify(state.statuses))}
function saveNotes(){localStorage.setItem("ddr2-notes",JSON.stringify(state.notes))}

const allLessons=COURSE.parts.flatMap(p=>p.modules.flatMap(m=>m.lessons));
const totalLessons=allLessons.length;
function getStatus(id){return state.statuses[id]||"pending"}
function countStatus(st,ls){return(ls||allLessons).filter(l=>getStatus(l.id)===st).length}
function countDone(ls){return(ls||allLessons).filter(l=>DONE_STATES.includes(getStatus(l.id))).length}
function pct(ls){const a=ls||allLessons;return a.length?Math.round(countDone(a)/a.length*100):0}
function findModule(id){for(const p of COURSE.parts)for(const m of p.modules)if(m.id===id)return{mod:m,part:p};return null}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1500)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function render(){
  const app=document.getElementById("app");
  const done=countDone();
  let h=`<div class="header"><div class="header-row"><div><div class="mono header-label">PRODUCTION TRACKER</div><div class="header-title"><span>DDR</span> 2.0</div></div><div><div class="mono header-pct">${pct()}%</div><div class="mono header-count">${done}/${totalLessons} DONE</div></div></div><div class="tabs"><button class="tab ${state.view==="overview"?"active":""}" onclick="switchView('overview')">Overview</button><button class="tab ${state.view==="modules"?"active":""}" onclick="switchView('modules')">Modules</button></div></div><div class="content">`;
  if(state.view==="overview")h+=renderOverview();
  else h+=state.activeModule?renderModuleDetail():renderModulesList();
  h+=`<div class="data-bar"><button class="data-btn" onclick="exportData()">↓ Export</button><button class="data-btn" onclick="document.getElementById('importFile').click()">↑ Import</button><button class="data-btn" onclick="resetData()" style="color:#EF4444;border-color:#EF444440">Reset</button></div>`;
  h+=`<div class="footer mono">DDR 2.0 by <a href="https://instagram.com/iamajmeena" target="_blank">Ajay K. Meena</a> • <a href="https://youtube.com/@ajaykmeenaa" target="_blank">@ajaykmeenaa</a></div>`;
  h+=`</div>`;
  app.innerHTML=h;
  if(state.modal)renderModal();
}

function renderOverview(){
  let h='<div class="status-grid">';
  for(const[k,s]of Object.entries(STATUSES)){if(k==="pending")continue;h+=`<div class="status-card" style="background:${s.bg};border-color:${s.color}20"><div class="mono status-card-num" style="color:${s.color}">${countStatus(k)}</div><div class="mono status-card-label" style="color:${s.color}">${s.label.toUpperCase()}</div></div>`}
  h+='</div><div class="progress-rings">';
  for(const part of COURSE.parts){const pl=part.modules.flatMap(m=>m.lessons);const p=pct(pl);const r=44,c=2*Math.PI*r,o=c-(p/100)*c;h+=`<div class="ring-wrap"><svg width="100" height="100"><circle cx="50" cy="50" r="${r}" fill="none" stroke="#1F2937" stroke-width="6"/><circle cx="50" cy="50" r="${r}" fill="none" stroke="${part.color}" stroke-width="6" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset 0.6s ease"/></svg><div class="ring-center"><div class="mono ring-pct" style="color:${part.color}">${p}%</div><div class="mono ring-label">${part.aperture}</div></div></div>`}
  h+='</div>';
  for(const part of COURSE.parts){
    h+=`<div class="part-header mono" style="color:${part.color}"><span style="display:inline-block;width:14px;height:2px;background:${part.color}"></span>${part.title} <span class="role">• ${part.role}</span></div>`;
    for(const mod of part.modules){const ml=mod.lessons;const d=countDone(ml);const p=ml.length?Math.round(d/ml.length*100):0;h+=`<button class="mod-row" onclick="openModule('${mod.id}')"><div class="mono mod-id">${mod.id}</div><div class="mod-info"><div class="mod-title">${mod.title}</div><div class="mod-bar-wrap"><div class="mod-bar"><div class="mod-bar-fill" style="width:${p}%;background:${part.color}"></div></div><span class="mono mod-frac">${d}/${ml.length}</span></div></div><div class="mono mod-diff" style="background:${DIFF_COLORS[mod.difficulty]}15;color:${DIFF_COLORS[mod.difficulty]}">${mod.difficulty}</div><div class="mod-arrow">›</div></button>`}
    h+='<div style="margin-bottom:20px"></div>';
  }
  return h;
}

function renderModulesList(){
  let h='<div class="filters">';
  const filters=[{key:"all",label:"All"},...Object.entries(STATUSES).map(([k,v])=>({key:k,label:v.label}))];
  for(const f of filters){const cnt=f.key==="all"?"":`<span class="filter-count">${countStatus(f.key)}</span>`;h+=`<button class="filter-btn ${state.filter===f.key?"active":""}" onclick="setFilter('${f.key}')">${f.label}${cnt}</button>`}
  h+='</div>';
  for(const part of COURSE.parts){for(const mod of part.modules){const filtered=mod.lessons.filter(l=>state.filter==="all"||getStatus(l.id)===state.filter);if(!filtered.length)continue;h+=`<button class="mod-link" style="color:${part.color}" onclick="openModule('${mod.id}')">${mod.id} — ${mod.title} ›</button>`;for(const l of filtered){const st=STATUSES[getStatus(l.id)];const np=state.notes[l.id]?`<span class="lesson-note-preview">📝 ${esc(state.notes[l.id])}</span>`:'';h+=`<div class="lesson-row-mini"><div class="mono lesson-id">${l.id}</div><div class="lesson-title-wrap"><span class="lesson-title-text">${esc(l.title)}</span>${np}</div><button class="status-pill compact" style="background:${st.bg};color:${st.color};border-color:${st.color}40" onclick="openStatusModal('${l.id}')"><span class="icon">${st.icon}</span>${st.label}</button></div>`}h+='<div style="margin-bottom:16px"></div>'}}
  return h;
}

function renderModuleDetail(){
  const found=findModule(state.activeModule);if(!found)return'';
  const{mod,part}=found;const ml=mod.lessons;const d=countDone(ml);const p=ml.length?Math.round(d/ml.length*100):0;
  const r=24,c=2*Math.PI*r,o=c-(p/100)*c;
  let h=`<button class="back-btn" onclick="closeModule()">← Back to all modules</button>`;
  h+=`<div class="mod-detail-header" style="border:1px solid ${part.color}30"><div class="mod-detail-top"><div><div class="mono mod-detail-tag" style="color:${part.color}">${mod.id} • ${mod.difficulty}</div><div class="mod-detail-title">${mod.title}</div><div class="mono mod-detail-count">${d}/${ml.length} lessons complete</div></div><div style="position:relative;width:64px;height:64px"><svg width="64" height="64" style="transform:rotate(-90deg)"><circle cx="32" cy="32" r="${r}" fill="none" stroke="#1F2937" stroke-width="4"/><circle cx="32" cy="32" r="${r}" fill="none" stroke="${part.color}" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span class="mono" style="font-size:14px;font-weight:700;color:${part.color}">${p}%</span></div></div></div>`;
  h+=`<div class="bulk-row"><span class="mono bulk-label">BULK:</span>${Object.entries(STATUSES).map(([k,s])=>`<button class="bulk-btn" style="color:${s.color};border:1px solid ${s.color}30" onclick="bulkSet('${mod.id}','${k}')">${s.icon} ${s.label}</button>`).join('')}</div></div>`;
  ml.forEach((l,i)=>{const st=getStatus(l.id);const s=STATUSES[st];const hn=!!state.notes[l.id];h+=`<div class="lesson-card" style="border-left-color:${s.color}"><div class="lesson-inner"><div class="mono lesson-num">${String(i+1).padStart(2,'0')}</div><div class="lesson-content"><div class="lesson-title">${esc(l.title)}</div><div class="lesson-actions"><button class="status-pill" style="background:${s.bg};color:${s.color};border-color:${s.color}40" onclick="openStatusModal('${l.id}')"><span class="icon">${s.icon}</span>${s.label}</button><button class="note-btn ${hn?'has-note':''}" onclick="openNoteModal('${l.id}','${esc(l.title)}')">${hn?'📝 Notes':'+ Note'}</button></div>${hn?`<div class="note-bubble">${esc(state.notes[l.id])}</div>`:''}</div></div></div>`});
  return h;
}

function renderModal(){
  const m=state.modal;let ov=document.createElement('div');ov.className='overlay';ov.onclick=e=>{if(e.target===ov)closeModal()};
  if(m.type==="status"){const cur=getStatus(m.lessonId);let inner=`<div class="modal"><div class="mono modal-label">SET STATUS — ${m.lessonId}</div>`;for(const[k,s]of Object.entries(STATUSES)){inner+=`<button class="modal-opt ${cur===k?'active':''}" style="${cur===k?`border-color:${s.color};background:${s.bg};color:${s.color}`:''}" onclick="setStatus('${m.lessonId}','${k}')"><span class="opt-icon">${s.icon}</span>${s.label}</button>`}inner+='</div>';ov.innerHTML=inner}
  else if(m.type==="note"){const note=state.notes[m.lessonId]||'';ov.innerHTML=`<div class="modal note-modal"><div class="mono modal-label" style="margin-bottom:4px">NOTES — ${m.lessonId}</div><div class="note-modal-title">${esc(m.lessonTitle)}</div><textarea class="note-textarea" id="noteText" placeholder="Add notes... recording reminders, script ideas, etc.">${esc(note)}</textarea><div class="note-btns"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveNote('${m.lessonId}')">Save</button></div></div>`}
  document.body.appendChild(ov);
}

function switchView(v){state.view=v;state.activeModule=null;render();window.scrollTo(0,0)}
function setFilter(f){state.filter=f;render()}
function openModule(id){state.activeModule=id;state.view="modules";render();window.scrollTo(0,0)}
function closeModule(){state.activeModule=null;render()}
function openStatusModal(id){state.modal={type:"status",lessonId:id};renderModal()}
function openNoteModal(id,title){state.modal={type:"note",lessonId:id,lessonTitle:title};renderModal()}
function closeModal(){state.modal=null;document.querySelectorAll('.overlay').forEach(e=>e.remove())}
function setStatus(id,st){state.statuses[id]=st;saveStatuses();closeModal();render();showToast(`${id} → ${STATUSES[st].label}`)}
function saveNote(id){const t=document.getElementById('noteText').value;if(t.trim()){state.notes[id]=t.trim()}else{delete state.notes[id]}saveNotes();closeModal();render();showToast('Note saved')}
function bulkSet(modId,st){const f=findModule(modId);if(!f)return;f.mod.lessons.forEach(l=>state.statuses[l.id]=st);saveStatuses();render();showToast(`${modId} → All ${STATUSES[st].label}`)}
function exportData(){const d={statuses:state.statuses,notes:state.notes,exported:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`DDR2-Tracker-${new Date().toISOString().slice(0,10)}.json`;a.click();showToast('Data exported')}
function importData(){const file=document.getElementById('importFile').files[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.statuses){state.statuses=d.statuses;saveStatuses()}if(d.notes){state.notes=d.notes;saveNotes()}render();showToast('Data imported')}catch(err){showToast('Import failed')}};r.readAsText(file)}
function resetData(){if(confirm('Sab data reset ho jayega. Sure ho?')){state.statuses={};state.notes={};saveStatuses();saveNotes();render();showToast('All data reset')}}

document.getElementById('importFile').addEventListener('change',importData);
loadState();

// Splash screen
setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>document.getElementById('splash').remove(),500)},1200);

render();

// Register Service Worker for PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>
